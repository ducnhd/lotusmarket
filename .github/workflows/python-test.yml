name: Python Tests

on:
  push:
    paths: ['python/**']
  pull_request:
    paths: ['python/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: python
        run: |
          pip install -e ".[all]"
          pip install pytest
      - name: Run tests
        working-directory: python
        env:
          LOTUSMARKET_QUIET: "1"
        run: pytest tests/ -v
