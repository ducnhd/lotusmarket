name: Go Tests

on:
  push:
    paths: ['go/**']
  pull_request:
    paths: ['go/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        working-directory: go
        run: go test ./... -v -count=1
      - name: Build
        working-directory: go
        run: go build ./...
